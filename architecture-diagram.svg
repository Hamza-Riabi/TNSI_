<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Dégradé de fond -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eef2f5;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1F4E78;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E5FA3;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="step1Gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c4e4ee;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="step2Gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e8f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dcc4ee;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="step3Gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f0e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eec4a4;stop-opacity:1" />
    </linearGradient>

    <!-- Définir les flèches -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1F4E78" />
    </marker>
  </defs>

  <!-- Fond -->
  <rect width="1200" height="900" fill="url(#bgGradient)"/>

  <!-- === HEADER === -->
  <rect x="0" y="0" width="1200" height="80" fill="url(#headerGradient)"/>
  <text x="600" y="50" font-size="32" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">
    Architecture cv-gen
  </text>

  <!-- === COUCHE 1 : ENTRÉES === -->
  <text x="50" y="130" font-size="14" font-weight="bold" fill="#1F4E78" font-family="Arial, sans-serif">ENTRÉES</text>

  <!-- BOX 1: Claude Code -->
  <rect x="80" y="150" width="220" height="100" rx="8" fill="url(#step1Gradient)" stroke="#1F4E78" stroke-width="2"/>
  <text x="190" y="175" font-size="13" font-weight="bold" fill="#1F4E78" text-anchor="middle" font-family="Arial, sans-serif">
    Claude Code
  </text>
  <text x="190" y="195" font-size="11" fill="#2c3e50" text-anchor="middle" font-family="Arial, sans-serif">
    Frontend CLI
  </text>
  <text x="190" y="215" font-size="11" fill="#2c3e50" text-anchor="middle" font-family="Arial, sans-serif">
    /pdf &lt;job_url&gt;
  </text>
  <text x="190" y="240" font-size="10" italic fill="#555" text-anchor="middle" font-family="Arial, sans-serif">
    User Interface
  </text>

  <!-- BOX 2: WebFetch/Playwright -->
  <rect x="370" y="150" width="220" height="100" rx="8" fill="url(#step1Gradient)" stroke="#1F4E78" stroke-width="2"/>
  <text x="480" y="175" font-size="13" font-weight="bold" fill="#1F4E78" text-anchor="middle" font-family="Arial, sans-serif">
    WebFetch /
  </text>
  <text x="480" y="195" font-size="13" font-weight="bold" fill="#1F4E78" text-anchor="middle" font-family="Arial, sans-serif">
    Playwright
  </text>
  <text x="480" y="215" font-size="11" fill="#2c3e50" text-anchor="middle" font-family="Arial, sans-serif">
    JD Extraction
  </text>
  <text x="480" y="240" font-size="10" italic fill="#555" text-anchor="middle" font-family="Arial, sans-serif">
    Web Scraping
  </text>

  <!-- BOX 3: CV Source -->
  <rect x="660" y="150" width="220" height="100" rx="8" fill="url(#step1Gradient)" stroke="#1F4E78" stroke-width="2"/>
  <text x="770" y="175" font-size="13" font-weight="bold" fill="#1F4E78" text-anchor="middle" font-family="Arial, sans-serif">
    CV Source
  </text>
  <text x="770" y="195" font-size="11" fill="#2c3e50" text-anchor="middle" font-family="Arial, sans-serif">
    (cv.md)
  </text>
  <text x="770" y="215" font-size="11" fill="#2c3e50" text-anchor="middle" font-family="Arial, sans-serif">
    + profile.yml
  </text>
  <text x="770" y="240" font-size="10" italic fill="#555" text-anchor="middle" font-family="Arial, sans-serif">
    Candidate Data
  </text>

  <!-- BOX 4: Claude API -->
  <rect x="950" y="150" width="220" height="100" rx="8" fill="url(#step2Gradient)" stroke="#6c5ce7" stroke-width="2"/>
  <text x="1060" y="175" font-size="13" font-weight="bold" fill="#6c5ce7" text-anchor="middle" font-family="Arial, sans-serif">
    Claude API
  </text>
  <text x="1060" y="195" font-size="11" fill="#2c3e50" text-anchor="middle" font-family="Arial, sans-serif">
    (GPT-4)
  </text>
  <text x="1060" y="215" font-size="11" fill="#2c3e50" text-anchor="middle" font-family="Arial, sans-serif">
    NLP Analysis
  </text>
  <text x="1060" y="240" font-size="10" italic fill="#555" text-anchor="middle" font-family="Arial, sans-serif">
    AI Intelligence
  </text>

  <!-- Flèches descendantes -->
  <line x1="190" y1="250" x2="480" y2="310" stroke="#1F4E78" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="480" y1="250" x2="600" y2="310" stroke="#1F4E78" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="770" y1="250" x2="600" y2="310" stroke="#1F4E78" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="1060" y1="250" x2="700" y2="310" stroke="#6c5ce7" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- === COUCHE 2 : PIPELINE D'ADAPTATION === -->
  <text x="50" y="330" font-size="14" font-weight="bold" fill="#1F4E78" font-family="Arial, sans-serif">TRAITEMENT</text>

  <rect x="300" y="310" width="600" height="180" rx="8" fill="white" stroke="#1F4E78" stroke-width="2"/>

  <text x="600" y="335" font-size="14" font-weight="bold" fill="#1F4E78" text-anchor="middle" font-family="Arial, sans-serif">
    Adaptation Pipeline
  </text>

  <!-- Étapes à l'intérieur -->
  <circle cx="380" cy="395" r="25" fill="#1F4E78"/>
  <text x="380" y="402" font-size="18" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">1</text>
  <text x="380" y="430" font-size="10" fill="#2c3e50" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">Extract</text>
  <text x="380" y="442" font-size="9" fill="#555" text-anchor="middle" font-family="Arial, sans-serif">Keywords</text>

  <circle cx="520" cy="395" r="25" fill="#1F4E78"/>
  <text x="520" y="402" font-size="18" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">2</text>
  <text x="520" y="430" font-size="10" fill="#2c3e50" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">Detect</text>
  <text x="520" y="442" font-size="9" fill="#555" text-anchor="middle" font-family="Arial, sans-serif">Archetype</text>

  <circle cx="660" cy="395" r="25" fill="#1F4E78"/>
  <text x="660" y="402" font-size="18" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">3</text>
  <text x="660" y="430" font-size="10" fill="#2c3e50" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">Reorder</text>
  <text x="660" y="442" font-size="9" fill="#555" text-anchor="middle" font-family="Arial, sans-serif">Bullets</text>

  <circle cx="800" cy="395" r="25" fill="#1F4E78"/>
  <text x="800" y="402" font-size="18" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">4</text>
  <text x="800" y="430" font-size="10" fill="#2c3e50" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">Inject</text>
  <text x="800" y="442" font-size="9" fill="#555" text-anchor="middle" font-family="Arial, sans-serif">Keywords</text>

  <!-- Flèches entre étapes -->
  <line x1="405" y1="395" x2="495" y2="395" stroke="#1F4E78" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="545" y1="395" x2="635" y2="395" stroke="#1F4E78" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="685" y1="395" x2="775" y2="395" stroke="#1F4E78" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Flèche vers HTML -->
  <line x1="600" y1="490" x2="600" y2="540" stroke="#1F4E78" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- === COUCHE 3 : GÉNÉRATION === -->
  <text x="50" y="560" font-size="14" font-weight="bold" fill="#1F4E78" font-family="Arial, sans-serif">GÉNÉRATION</text>

  <!-- BOX HTML -->
  <rect x="350" y="540" width="250" height="120" rx="8" fill="url(#step1Gradient)" stroke="#1F4E78" stroke-width="2"/>
  <text x="475" y="565" font-size="13" font-weight="bold" fill="#1F4E78" text-anchor="middle" font-family="Arial, sans-serif">
    HTML Generation
  </text>
  <text x="475" y="585" font-size="11" fill="#2c3e50" text-anchor="middle" font-family="Arial, sans-serif">
    • Template: cv-template.html
  </text>
  <text x="475" y="605" font-size="11" fill="#2c3e50" text-anchor="middle" font-family="Arial, sans-serif">
    • CSS: Space Grotesk, DM Sans
  </text>
  <text x="475" y="625" font-size="11" fill="#2c3e50" text-anchor="middle" font-family="Arial, sans-serif">
    • Fonts: embedded base64
  </text>

  <!-- BOX Playwright -->
  <rect x="650" y="540" width="250" height="120" rx="8" fill="url(#step3Gradient)" stroke="#e17055" stroke-width="2"/>
  <text x="775" y="565" font-size="13" font-weight="bold" fill="#e17055" text-anchor="middle" font-family="Arial, sans-serif">
    Playwright PDF Render
  </text>
  <text x="775" y="585" font-size="11" fill="#2c3e50" text-anchor="middle" font-family="Arial, sans-serif">
    • Binary search: optimal scale
  </text>
  <text x="775" y="605" font-size="11" fill="#2c3e50" text-anchor="middle" font-family="Arial, sans-serif">
    • Normalize: UTF-8, ATS
  </text>
  <text x="775" y="625" font-size="11" fill="#2c3e50" text-anchor="middle" font-family="Arial, sans-serif">
    • Output: 1-page PDF
  </text>

  <!-- Flèche HTML → Playwright -->
  <line x1="600" y1="600" x2="650" y2="600" stroke="#1F4E78" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- === COUCHE 4 : OUTPUT === -->
  <line x1="775" y1="660" x2="775" y2="710" stroke="#1F4E78" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- BOX Résultat Final -->
  <rect x="600" y="710" width="350" height="120" rx="8" fill="#e8f4f8" stroke="#1F4E78" stroke-width="3"/>
  <text x="775" y="740" font-size="16" font-weight="bold" fill="#1F4E78" text-anchor="middle" font-family="Arial, sans-serif">
    📄 PDF File
  </text>
  <text x="775" y="765" font-size="12" fill="#2c3e50" text-anchor="middle" font-family="Arial, sans-serif">
    /output/cv-{candidate}-{company}-{date}.pdf
  </text>
  <text x="775" y="785" font-size="11" fill="#555" text-anchor="middle" font-family="Arial, sans-serif">
    ✓ 1 page • ✓ ATS-compatible • ✓ UTF-8 avec accents
  </text>
  <text x="775" y="810" font-size="11" fill="#555" text-anchor="middle" font-family="Arial, sans-serif">
    ✓ Personnalisé • ✓ Keywords injectés naturellement
  </text>

  <!-- === LÉGENDE === -->
  <text x="50" y="870" font-size="11" fill="#666" font-family="Arial, sans-serif">
    💡 Pipeline entièrement automatisé | Claude Code Skill | Temps d'exécution: &lt;2 minutes
  </text>
</svg>
